name: test

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m compileall src tests
      - run: pytest -q
